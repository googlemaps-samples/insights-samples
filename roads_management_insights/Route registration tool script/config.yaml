# Configuration for updating the Export JSON from CSV
project_info:
  id: 1
  project_name: "boston"
  google_cloud_project_id: "rmi-sandbox"
  google_cloud_project_number: "1024202510105"
  subscription_id: "rmi-sub-1024202510105"
  dataset_name: "historical_roads_data"
  tag: "boston-sample"

paths:
  # Path to the CSV file containing the new routes
  input_csv_file: "../route_registration_from_csv/sample2.csv"
  # Path to the base export JSON file (exported from RMI)
  base_export_json_file: "base_export.json"
  # Path where the updated export JSON will be saved
  output_export_json_file: "sample_export.json"

csv_format:
  # Column names in the CSV file
  segment_id_column: "SEGMENT_ID"
  geometry_wkt_column: "shape_wkt"
  length_column: "Shape_Leng"

route_settings:
  # Prefix for automatically generated route names
  route_name_prefix: "new-route-"
  route_type: "imported"
  sync_status: "unsynced"
  is_enabled: 1
